spavaca:
  climate: climate.radijator_spavaca
  temp_sensor: sensor.temperatura_spavaca
  humidity_sensor: sensor.vlaznost_spavaca
  window_sensors:
  - binary_sensor.contact_sensor_2_vrata
  target: 21.0
  target_step: 1.0
  predictive:
    auto_apply_targets: true
    deadband: 0.5
    max_step_per_cycle: 1.0
    min_temp: 8.0
    max_temp: 35.0
    smart_boost_enabled: true
    smart_boost_delta: 2.0
    smart_boost_max: 35.0
    smart_boost_deadband: 0.5
  target_input: input_number.ai_kuca_target_spavaca
dnevna:
  climate: climate.radijator_dnevna
  temp_sensor: sensor.temperatura_dnevna
  humidity_sensor: sensor.vlaznost_dnevna
  fan: fan.ventilator_dnevna
  ventilation:
    delta_on: 4.0
    delta_off: 2.0
    abs_on: 60.0
    abs_off: 55.0
    min_on_sec: 300
    min_off_sec: 180
  window_sensors:
  - binary_sensor.dnevna_prozor
  - binary_sensor.contact_sensor_4_vrata
  - binary_sensor.senzor_vrata
  target: 21.0
  target_step: 0.5
  predictive:
    auto_apply_targets: true
    deadband: 0.5
    max_step_per_cycle: 0.5
    min_temp: 8.0
    max_temp: 35.0
    smart_boost_enabled: true
    smart_boost_delta: 2.0
    smart_boost_max: 35.0
    smart_boost_deadband: 0.5
  target_input: input_number.ai_kuca_target_dnevna
