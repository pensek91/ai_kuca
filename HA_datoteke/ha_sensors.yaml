template:
  - trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id:
          - sensor.cm_pelet_set_boiler_temperature
          - sensor.cm_pelet_set_outdoor_temperature
          - sensor.temperatura_vani
          - climate.radijator_spavaca
          - climate.radijator_dnevna
          - climate.radijator_kupaona
          - climate.radiator_mali
          - climate.radijator_tia
          - climate.radijator_spajz
    sensor:
      - name: "ai_recommended_flow_temperature"
        unit_of_measurement: "°C"
        state: >
          {% set radijatori = [
            state_attr('climate.radijator_spavaca','temperature') | float(20),
            state_attr('climate.radijator_dnevna','temperature') | float(20),
            state_attr('climate.radijator_kupaona','temperature') | float(20),
            state_attr('climate.radiator_mali','temperature') | float(20),
            state_attr('climate.radijator_tia','temperature') | float(20),
            state_attr('climate.radijator_spajz','temperature') | float(10)
          ] %}
          {% set max_target = radijatori | max %}

          {# vanjska temp: prosjek 2 senzora, fallback #}
          {% set t1_raw = states('sensor.cm_pelet_set_outdoor_temperature') %}
          {% set t2_raw = states('sensor.temperatura_vani') %}
          {% set t1 = (t1_raw | float) if t1_raw not in ['unknown','unavailable','none'] else none %}
          {% set t2 = (t2_raw | float) if t2_raw not in ['unknown','unavailable','none'] else none %}
          {% if t1 is not none and t2 is not none %}
            {% set outdoor = (t1 + t2) / 2 %}
          {% elif t1 is not none %}
            {% set outdoor = t1 %}
          {% elif t2 is not none %}
            {% set outdoor = t2 %}
          {% else %}
            {% set outdoor = 0 %}
          {% endif %}

          {% set boiler = states('sensor.cm_pelet_set_boiler_temperature') | float(0) %}

          {# baza #}
          {% set base = max_target + 2 %}
          {% set t_ref = 20 %}

          {# slope vrijednosti po zonama (radijatori) #}
          {% set s_cold = 1.6 %}
          {% set s_mid  = 1.3 %}
          {% set s_warm = 1.0 %}

          {# smoothstep helper #}
          {% macro smoothstep(x, edge0, edge1) -%}
            {% if x <= edge0 %} 0
            {% elif x >= edge1 %} 1
            {% else %}
              {% set t = (x-edge0)/(edge1-edge0) %}
              {{ t*t*(3-2*t) }}
            {% endif %}
          {%- endmacro %}

          {# blend slope između zona #}
          {% set w1 = smoothstep(outdoor, 0, 10) | float %}
          {% set w2 = smoothstep(outdoor, 10, 18) | float %}
          {% set slope_0_10 = s_cold + (s_mid - s_cold) * w1 %}
          {% set slope_10_18 = s_mid + (s_warm - s_mid) * w2 %}
          {% if outdoor < 10 %}
            {% set slope = slope_0_10 %}
          {% elif outdoor < 18 %}
            {% set slope = slope_10_18 %}
          {% else %}
            {% set slope = 0 %}
          {% endif %}

          {# krivulja #}
          {% if outdoor >= 18 %}
            {% set raw = 35 %}
          {% else %}
            {% set raw = base + slope * (t_ref - outdoor) %}
          {% endif %}

          {# max limit: 75 ili temp kotla ako je niza #}
          {% set max_limit = [75, boiler] | min %}
          {% set calc = [ [raw, max_limit] | min, 35 ] | max %}

          {# histereza kotla: >=80 -> kotao-5, <=79 -> calc, izmedu zadrzi #}
          {% set prev = this.state | float(0) %}
          {% if boiler >= 80 %}
            {{ (boiler - 5) | round(1) }}
          {% elif boiler <= 79 %}
            {{ calc | round(1) }}
          {% else %}
            {% if prev >= (boiler - 5) %}
              {{ (boiler - 5) | round(1) }}
            {% else %}
              {{ calc | round(1) }}
            {% endif %}
          {% endif %}



################################################################################################################
############################ $ SENZOR TEMPERATURE U SLOVIMA $ ##################################################
################################################################################################################

  - sensor:
      - name: "Boiler temperature status"
        unique_id: boiler_temperature_status
        state: >
          {% set temp = states('sensor.cm_pelet_set_boiler_temperature') | float %}
          {% if temp < 35 %}
            hladno
          {% elif temp < 40 %}
            mlako
          {% elif temp < 60 %}
            toplo
          {% elif temp < 70 %}
            ugodno
          {% elif temp < 80 %}
            vruce
          {% elif temp < 81 %}
            vrlo vruce 81
          {% elif temp < 82 %}
            vrlo vruce 82
          {% elif temp < 83 %}
            vrlo vruce 83
          {% elif temp < 84 %}
            vrlo vruce 84
          {% elif temp < 85 %}
            jako vruce 85+
          {% elif temp < 88 %}
            kriticno
          {% elif temp > 88 %}
            ALARMANTNO
          {% else %}
            Nepoznato
          {% endif %}
        icon: >
          {% set temp = states('sensor.cm_pelet_set_boiler_temperature') | float %}
          {% if temp < 50 %}
            mdi:thermometer-low
          {% elif temp < 70 %}
            mdi:thermometer
          {% elif temp < 85 %}
            mdi:thermometer-high
          {% else %}
            mdi:thermometer-alert
          {% endif %}
